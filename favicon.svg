<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Animated gradient that cycles through Flutter/dev palette -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#54C5F8">
        <animate attributeName="stop-color"
          values="#54C5F8;#01BFFD;#7C4DFF;#FF4081;#54C5F8"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#01BFFD">
        <animate attributeName="stop-color"
          values="#01BFFD;#7C4DFF;#FF4081;#54C5F8;#01BFFD"
          dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" ry="14" fill="#0D1117"/>

  <!-- Left bracket < -->
  <g filter="url(#glow)" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="20,16 8,32 20,48">
      <animateTransform attributeName="transform" type="translate"
        values="0,0;-2,0;0,0" dur="1.8s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </polyline>
  </g>

  <!-- Right bracket > -->
  <g filter="url(#glow)" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="44,16 56,32 44,48">
      <animateTransform attributeName="transform" type="translate"
        values="0,0;2,0;0,0" dur="1.8s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </polyline>
  </g>

  <!-- Slash / in the center -->
  <line x1="38" y1="14" x2="26" y2="50"
    stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
</svg>
